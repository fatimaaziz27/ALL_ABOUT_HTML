<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Build Your Database</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020b22;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

/* Grid */
.grid{
    position:fixed;
    inset:0;
    background-image: radial-gradient(circle,#2476ff 1.2px,transparent 1.2px);
    background-size:48px 48px;
    opacity:.55;
}

/* SVG wires */
svg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

path{
    fill:none;
    stroke:#2d7dff;
    stroke-width:3;
    stroke-linecap:round;
    filter:drop-shadow(0 0 8px #2d7dff);
}

/* Container */
.container{
    position:relative;
    width:1400px;
    height:900px;
    margin:auto;
}

/* Cards */
.card{
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(16,45,110,.55);
    border:2px solid #2d7dff;
    border-radius:18px;

    backdrop-filter:blur(20px);

    box-shadow:
    inset 0 0 40px rgba(50,130,255,.15),
    0 0 25px rgba(20,120,255,.15);

    cursor:grab;
    user-select:none;

    transition:background 0.2s;
}

.card:active{
    cursor:grabbing;
}

.card h1{
    color:white;
    font-size:72px;
}

/* Positions */
.build{
    width:420px;
    height:180px;
    top:140px;
    left:240px;
}

.your{
    width:380px;
    height:180px;
    top:400px;
    left:520px;
}

.database{
    width:620px;
    height:210px;
    top:650px;
    left:700px;
}

/* dots */
.dot{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    border:4px solid white;
    background:#020b22;
    box-shadow:0 0 18px #3a87ff;
}

.left{ left:-13px; top:50%; transform:translateY(-50%); }
.right{ right:-13px; top:50%; transform:translateY(-50%); }
</style>
</head>

<body>

<div class="grid"></div>

<svg>
    <path id="wire1"></path>
    <path id="wire2"></path>
</svg>

<div class="container">

    <div class="card build" id="build">
        <div class="dot right"></div>
        <h1>Build</h1>
    </div>

    <div class="card your" id="your">
        <div class="dot left"></div>
        <div class="dot right"></div>
        <h1>Your</h1>
    </div>

    <div class="card database" id="database">
        <div class="dot left"></div>
        <h1>Database</h1>
    </div>

</div>

<script>
// ---------------- WIRES ----------------
const wire1 = document.getElementById("wire1");
const wire2 = document.getElementById("wire2");

function point(el, side){
    const r = el.getBoundingClientRect();
    return side === "right"
        ? { x: r.right, y: r.top + r.height/2 }
        : { x: r.left, y: r.top + r.height/2 };
}

function curve(start, end){
    const offset = Math.abs(end.y - start.y) * 0.7;

    return `
        M ${start.x} ${start.y}
        C ${start.x + 120} ${start.y}
        ${end.x - 120} ${end.y - offset}
        ${end.x} ${end.y}
    `;
}

function draw(){
    const build = point(document.getElementById("build"), "right");
    const your = document.getElementById("your");

    const yourLeft = point(your, "left");
    const yourRight = point(your, "right");

    const dbLeft = point(document.getElementById("database"), "left");

    wire1.setAttribute("d", curve(build, yourLeft));
    wire2.setAttribute("d", curve(yourRight, dbLeft));
}

draw();
window.addEventListener("resize", draw);

// ---------------- DRAG ----------------
document.querySelectorAll(".card").forEach(card => {

    let moving = false;
    let dx = 0;
    let dy = 0;

    card.addEventListener("mousedown", e => {
        moving = true;
        dx = e.clientX - card.offsetLeft;
        dy = e.clientY - card.offsetTop;
    });

    document.addEventListener("mousemove", e => {
        if(!moving) return;

        card.style.left = (e.clientX - dx) + "px";
        card.style.top = (e.clientY - dy) + "px";

        draw();
    });

    document.addEventListener("mouseup", () => moving = false);
});

// ---------------- HOVER GLOW ----------------
document.querySelectorAll(".card").forEach(card => {

    card.addEventListener("mousemove", e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        card.style.background =
        `radial-gradient(circle at ${x}px ${y}px,
        rgba(70,140,255,.45),
        rgba(18,50,120,.55) 45%,
        rgba(10,25,70,.75) 100%)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.background = "rgba(16,45,110,.55)";
    });

});
</script>

</body>
</html>
